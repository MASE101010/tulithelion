<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תולי האריה - המשחק הרשמי</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff9e6; /* צבע רקע צהבהב/חמים */
            color: #333;
            text-align: center;
            margin: 0;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            color: #ff9800; /* כתום אריה */
            font-size: 3.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        p {
            font-size: 1.3em;
            margin-bottom: 40px;
            max-width: 600px;
            line-height: 1.6;
            color: #555;
        }
        .download-btn {
            background-color: #4CAF50; /* ירוק גוגל פליי */
            color: white;
            padding: 15px 35px;
            text-decoration: none;
            font-size: 1.4em;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        .download-btn:hover {
            background-color: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(0,0,0,0.2);
        }
        .footer {
            margin-top: 60px;
            font-size: 0.9em;
            color: #999;
        }
        .emoji {
            font-size: 1.2em;
        }
    </style>
</head>
<body>

    <h1><span class="emoji">🦁</span> תולי האריה <span class="emoji">🦁</span></h1>
    
    <p>ברוכים הבאים לאתר הרשמי של משחק הילדים האהוב!<br>
    הצטרפו לתולי האריה להרפתקה מרתקת, חינוכית ומהנה לכל המשפחה.</p>

    <a href="https://play.google.com/store/apps/details?id=com.base69af0e012f86163366dab407.app" class="download-btn" target="_blank">להורדת המשחק ב-Google Play</a>

    <div class="footer">
        © 2026 כל הזכויות שמורות - תולי האריה
    </div>

</body>
</html>
