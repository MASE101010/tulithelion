<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תולי האריה - המשחק הרשמי</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #222;
        }
        .header {
            background-color: #ff9800; /* כתום אריה */
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            height: 40px;
        }
        .title {
            font-size: 1.5em;
            font-weight: bold;
        }
        .download-btn {
            background-color: #4CAF50;
            color: white;
            padding: 8px 16px;
            text-decoration: none;
            border-radius: 20px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .download-btn:hover {
            background-color: #45a049;
        }
        iframe {
            width: 100%;
            height: calc(100vh - 60px); /* גובה המסך פחות הכותרת */
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="title">🦁 תולי האריה</div>
        <a href="https://play.google.com/store/apps/details?id=com.base69af0e012f86163366dab407.app" class="download-btn" target="_blank">להורדת האפליקציה</a>
    </div>

    <iframe src="https://tulijump.base44.app" allowfullscreen></iframe>

</body>
</html>
